version: "3.9"

services:
  posgre:
    image: pgvector/pgvector:pg16
    container_name: posgre
    environment:
      POSTGRES_USER: asmolenski
      POSTGRES_PASSWORD: asmolenski1234
      POSTGRES_DB: Tutor10
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
